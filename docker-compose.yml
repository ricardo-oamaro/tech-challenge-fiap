version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql_container
    environment:
        MYSQL_ROOT_PASSWORD: root@2
        MYSQL_USER: root@2
        MYSQL_PASSWORD: root@2
        MYSQL_DATABASE: tech_challenge_fiap
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: